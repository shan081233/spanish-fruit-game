<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>西班牙語水果遊戲 PRO</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background: #f7f7f7;
    }

    .card {
      font-size: 40px;
      margin: 20px;
      font-weight: bold;
    }

    input {
      font-size: 20px;
      padding: 8px;
      width: 200px;
    }

    button {
      font-size: 18px;
      margin: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    #result {
      font-size: 22px;
      margin-top: 15px;
    }

    #score {
      font-size: 24px;
      color: green;
    }
  </style>
</head>

<body>

  <h1>🍎 西語水果 PRO 遊戲</h1>

  <div class="card" id="question">載入中...</div>

  <input type="text" id="answer" placeholder="輸入西語">
  <br>
  <button onclick="check()">提交</button>
  <button onclick="next()">下一題</button>
  <button onclick="restart()">重新開始</button>

  <p id="result"></p>
  <p>分數：<span id="score">0</span></p>

<script>
  const fruits = [
    { zh: "蘋果", es: "manzana" },
    { zh: "香蕉", es: "plátano" },
    { zh: "橘子", es: "naranja" },
    { zh: "葡萄", es: "uva" },
    { zh: "草莓", es: "fresa" },
    { zh: "鳳梨", es: "piña" },
    { zh: "西瓜", es: "sandía" },
    { zh: "芒果", es: "mango" }
  ];

  let current = {};
  let score = 0;
  let streak = 0;

  function randomFruit() {
    current = fruits[Math.floor(Math.random() * fruits.length)];
    document.getElementById("question").innerText = current.zh;
  }

  function check() {
    let user = document.getElementById("answer").value.trim();
    let result = document.getElementById("result");

    if (user === current.es) {
      score++;
      streak++;
      result.innerText = "✔ 正確！連勝 " + streak;
      result.style.color = "green";
    } else {
      streak = 0;
      result.innerText = "❌ 錯了，正確是 " + current.es;
      result.style.color = "red";
    }

    document.getElementById("score").innerText = score;
  }

  function next() {
    document.getElementById("answer").value = "";
    randomFruit();
    document.getElementById("result").innerText = "";
  }

  function restart() {
    score = 0;
    streak = 0;
    document.getElementById("score").innerText = score;
    document.getElementById("result").innerText = "";
    document.getElementById("answer").value = "";
    randomFruit();
  }

  // 初始化
  randomFruit();
</script>

</body>
</html>
